name: Publish Login Desktop Updates

on:
  push:
    branches:
      - main
    paths:
      - desktop/**
      - scripts/desktop/**
      - .github/workflows/desktop-updates.yml
  workflow_dispatch:

concurrency:
  group: login-desktop-updates
  cancel-in-progress: false

jobs:
  macos:
    name: Build macOS updater
    runs-on: macos-latest
    env:
      DEPLOY_HOST: ${{ secrets.APP_API_DESKTOP_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.APP_API_DESKTOP_DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.APP_API_DESKTOP_DEPLOY_KEY }}
      DEPLOY_PATH: ${{ secrets.APP_API_DESKTOP_DEPLOY_PATH }}
    defaults:
      run:
        working-directory: desktop
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      DESKTOP_UPDATE_PUBLIC_BASE_URL: https://hanasand.com/api/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed desktop update
        run: npm run desktop:build

      - name: Prepare update manifest
        working-directory: .
        env:
          DESKTOP_UPDATE_OUTPUT_DIR: desktop-update
          DESKTOP_UPDATE_NOTES: Login Desktop update from ${{ github.sha }}
        run: node scripts/desktop/prepare-update-manifest.mjs

      - name: Upload update artifacts to app-api host
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != '' && env.DEPLOY_PATH != '' }}
        working-directory: .
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/login-desktop-updates
          chmod 600 ~/.ssh/login-desktop-updates
          rsync -az -e "ssh -i ~/.ssh/login-desktop-updates -o StrictHostKeyChecking=no" desktop-update/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
