name: Publish Login Desktop Updates

on:
  push:
    branches:
      - main
    paths:
      - desktop/**
      - scripts/desktop/**
      - .github/workflows/desktop-updates.yml
  workflow_dispatch:

concurrency:
  group: login-desktop-updates
  cancel-in-progress: false

jobs:
  macos:
    name: Build macOS updater
    runs-on: macos-latest
    env:
      DEPLOY_HOST: ${{ secrets.APP_API_DESKTOP_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.APP_API_DESKTOP_DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.APP_API_DESKTOP_DEPLOY_KEY }}
      DEPLOY_PATH: ${{ secrets.APP_API_DESKTOP_DEPLOY_PATH }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      DESKTOP_UPDATE_PUBLIC_BASE_URL: https://app.login.no/api/desktop
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Normalize updater signing key
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "No updater signing key configured."
            exit 0
          fi

          NORMALIZED_KEY="${RAW_TAURI_SIGNING_PRIVATE_KEY//\\n/$'\n'}"

          if printf '%s' "$NORMALIZED_KEY" | grep -q 'untrusted comment:'; then
            {
              echo 'TAURI_SIGNING_PRIVATE_KEY<<EOF'
              printf '%s\n' "$NORMALIZED_KEY"
              echo 'EOF'
            } >> "$GITHUB_ENV"
            echo "Updater signing key is already in minisign format."
            exit 0
          fi

          DECODED_KEY="$(
            printf '%s' "$NORMALIZED_KEY" | base64 --decode 2>/dev/null \
            || printf '%s' "$NORMALIZED_KEY" | base64 -D 2>/dev/null \
            || true
          )"
          DECODED_KEY="${DECODED_KEY//\\n/$'\n'}"
          if printf '%s' "$DECODED_KEY" | grep -q 'untrusted comment:'; then
            {
              echo 'TAURI_SIGNING_PRIVATE_KEY<<EOF'
              printf '%s\n' "$DECODED_KEY"
              echo 'EOF'
            } >> "$GITHUB_ENV"
            echo "Decoded base64 updater signing key for Tauri."
            exit 0
          fi

          echo "Updater signing key is neither raw minisign text nor base64-encoded minisign text."
          exit 1

      - name: Build signed desktop update
        run: npm run desktop:build

      - name: Prepare update manifest
        working-directory: .
        env:
          DESKTOP_UPDATE_OUTPUT_DIR: desktop-update
          DESKTOP_UPDATE_NOTES: Login Desktop update from ${{ github.sha }}
        run: node scripts/desktop/prepare-update-manifest.mjs

      - name: Upload update artifacts to app-api host
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != '' && env.DEPLOY_PATH != '' }}
        working-directory: .
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/login-desktop-updates
          chmod 600 ~/.ssh/login-desktop-updates
          rsync -az -e "ssh -i ~/.ssh/login-desktop-updates -o StrictHostKeyChecking=no" desktop-update/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
