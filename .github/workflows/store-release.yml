name: Release Nucleus To Stores

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nucleus-store-release
  cancel-in-progress: false

jobs:
  android:
    name: Local build and submit Android
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Setup Java for Android local build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Preflight EAS store release
        run: node scripts/ci/verify-store-release-env.mjs --strict --platform=android

      - name: Test project
        run: npm test -- --runInBand

      - name: Write Google Play service account key
        run: |
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > google-play-service-account.json

      - name: Build Android locally
        run: |
          mkdir -p dist
          npx eas-cli@latest build --local --platform android --profile production --output ./dist/login-android.aab --non-interactive

      - name: Submit Android artifact to Google Play
        run: npx eas-cli@latest submit --platform android --profile production --path ./dist/login-android.aab --wait --non-interactive

  ios:
    name: Local build and submit iOS
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Setup Ruby for CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Preflight EAS store release
        run: node scripts/ci/verify-store-release-env.mjs --strict --platform=ios

      - name: Test project
        run: npm test -- --runInBand

      - name: Expose bundled Apple build tools
        run: |
          bundle config set bin vendor/bundle/bin
          bundle binstubs fastlane cocoapods --force
          echo "$PWD/vendor/bundle/bin" >> "$GITHUB_PATH"
          echo "$PWD/vendor/bundle/ruby/3.3.0/bin" >> "$GITHUB_PATH"

      - name: Build iOS locally
        run: |
          mkdir -p dist
          npx eas-cli@latest build --local --platform ios --profile production --output ./dist/login-ios.ipa --non-interactive

      - name: Submit iOS artifact to TestFlight
        run: npx eas-cli@latest submit --platform ios --profile production --path ./dist/login-ios.ipa --wait --non-interactive
