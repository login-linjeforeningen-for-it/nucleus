name: Release Nucleus To Stores

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nucleus-store-release
  cancel-in-progress: false

jobs:
  android:
    name: EAS build and submit Android
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight EAS store release
        run: node scripts/ci/verify-store-release-env.mjs --strict

      - name: Test project
        run: npm test -- --runInBand

      - name: Build and submit to Google Play through EAS
        run: npx eas build --platform android --profile production --auto-submit --wait --non-interactive

  ios:
    name: EAS build and submit iOS
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight EAS store release
        run: node scripts/ci/verify-store-release-env.mjs --strict

      - name: Test project
        run: npm test -- --runInBand

      - name: Build and submit to TestFlight through EAS
        run: npx eas build --platform ios --profile production --auto-submit --wait --non-interactive
