name: Release Nucleus To Stores

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Store platform to release
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

concurrency:
  group: nucleus-store-release
  cancel-in-progress: false

jobs:
  android:
    name: Build locally and submit Android
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_TRACK: internal
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java for Android local build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: |
          export BUN_INSTALL_CACHE_DIR="$RUNNER_TEMP/bun-install-cache"
          bun install --frozen-lockfile || {
            rm -rf "$BUN_INSTALL_CACHE_DIR"
            bun install --frozen-lockfile
          }

      - name: Preflight direct store release
        run: node scripts/ci/verify-direct-store-release-env.mjs --strict --platform=android

      - name: Test project
        run: bun run test -- --runInBand

      - name: Generate Android project locally
        run: bunx expo prebuild --platform android --clean --no-install

      - name: Configure Android SDK path
        run: |
          SDK_PATH="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK not found at $SDK_PATH"
            exit 1
          fi
          echo "ANDROID_HOME=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\n' "$SDK_PATH" > android/local.properties

      - name: Configure Android release signing
        run: node scripts/ci/configure-android-release-signing.mjs

      - name: Write Google Play service account key
        run: |
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > google-play-service-account.json

      - name: Validate Google Play service account key
        run: |
          bundle exec ruby -rgoogleauth -e "creds = Google::Auth::ServiceAccountCredentials.make_creds(json_key_io: File.open('google-play-service-account.json'), scope: ['https://www.googleapis.com/auth/androidpublisher']); creds.fetch_access_token!"

      - name: Build and submit Android directly with Fastlane
        run: bundle exec fastlane android release

  ios:
    name: Build locally and submit iOS
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Ruby for Fastlane and CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: |
          export BUN_INSTALL_CACHE_DIR="$RUNNER_TEMP/bun-install-cache"
          bun install --frozen-lockfile || {
            rm -rf "$BUN_INSTALL_CACHE_DIR"
            bun install --frozen-lockfile
          }

      - name: Preflight direct store release
        run: node scripts/ci/verify-direct-store-release-env.mjs --strict --platform=ios

      - name: Test project
        run: bun run test -- --runInBand

      - name: Generate iOS project locally
        run: |
          bunx expo prebuild --platform ios --clean --no-install
          node scripts/ci/disable-pods-code-signing.mjs

      - name: Ensure iOS platform is installed
        run: |
          if xcodebuild -showsdks | grep -q iphoneos26.2; then
            exit 0
          fi
          PLATFORM_DMG="$RUNNER_TEMP/iOS-26.2.dmg"
          xcodebuild -downloadPlatform iOS -exportPath "$PLATFORM_DMG" -buildVersion 26.2 -architectureVariant universal
          xcodebuild -importPlatform "$PLATFORM_DMG"
          xcodebuild -showsdks | grep -q iphoneos26.2

      - name: Prepare macOS signing keychain
        run: |
          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
          if [ ! -f "$LOGIN_KEYCHAIN" ]; then
            echo "Login keychain not found at $LOGIN_KEYCHAIN"
            exit 1
          fi

          security list-keychains -d user -s "$LOGIN_KEYCHAIN"
          security default-keychain -d user -s "$LOGIN_KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$LOGIN_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$LOGIN_KEYCHAIN"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security default-keychain -d user
          security find-identity -v -p codesigning "$LOGIN_KEYCHAIN"

      - name: Build and submit iOS directly with Fastlane
        run: |
          RELEASE_ENV="$RUNNER_TEMP/ios-release-env.sh"
          export RELEASE_ENV
          trap 'rm -f "$RELEASE_ENV"' EXIT
          {
            printf 'export ASC_KEY_ID=%q\n' "$ASC_KEY_ID"
            printf 'export ASC_ISSUER_ID=%q\n' "$ASC_ISSUER_ID"
            printf 'export ASC_PRIVATE_KEY_BASE64=%q\n' "$ASC_PRIVATE_KEY_BASE64"
            printf 'export APPLE_TEAM_ID=%q\n' "$APPLE_TEAM_ID"
            printf 'export MACOS_KEYCHAIN_PASSWORD=%q\n' "$MACOS_KEYCHAIN_PASSWORD"
            printf 'export RUNNER_TOOL_CACHE=%q\n' "$RUNNER_TOOL_CACHE"
            printf 'export CI=%q\n' "$CI"
            for name in PATH GEM_HOME GEM_PATH BUNDLE_GEMFILE RUBYLIB RUBYOPT; do
              if [ -n "${!name:-}" ]; then
                printf 'export %s=%q\n' "$name" "${!name}"
              fi
            done
            printf 'cd %q\n' "$GITHUB_WORKSPACE"
            printf 'bundle exec fastlane ios release\n'
          } > "$RELEASE_ENV"
          chmod 600 "$RELEASE_ENV"
          /usr/bin/expect <<'EXPECT'
          set timeout -1
          set password $env(MACOS_KEYCHAIN_PASSWORD)
          set script $env(RELEASE_ENV)
          spawn ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no tekkom@localhost "bash $script"
          expect {
            "password:" {
              send "$password\r"
              exp_continue
            }
            eof {
              catch wait result
              exit [lindex $result 3]
            }
          }
          EXPECT
