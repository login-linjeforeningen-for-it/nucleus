name: Release Nucleus To Stores

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nucleus-store-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and submit iOS + Android
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      GOOGLE_SERVICES_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICES_PLIST_BASE64 }}
      GOOGLE_PLAY_TRACK: production
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Preflight direct store release
        run: node scripts/ci/verify-direct-store-release-env.mjs --strict

      - name: Test project
        run: npm test -- --runInBand

      - name: Write release credentials
        run: node scripts/ci/write-direct-store-credentials.mjs

      - name: Generate native projects
        run: npx expo prebuild --non-interactive --clean

      - name: Build and submit to Apple and Google
        run: |
          bundle exec fastlane ios release
          bundle exec fastlane android release
