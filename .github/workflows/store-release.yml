name: Release Nucleus To Stores

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nucleus-store-release
  cancel-in-progress: false

jobs:
  android:
    name: Build locally and submit Android
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_TRACK: internal
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Setup Java for Android local build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Preflight direct store release
        run: node scripts/ci/verify-direct-store-release-env.mjs --strict --platform=android

      - name: Test project
        run: npm test -- --runInBand

      - name: Generate Android project locally
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure Android SDK path
        run: |
          SDK_PATH="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK not found at $SDK_PATH"
            exit 1
          fi
          echo "ANDROID_HOME=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\n' "$SDK_PATH" > android/local.properties

      - name: Configure Android release signing
        run: node scripts/ci/configure-android-release-signing.mjs

      - name: Write Google Play service account key
        run: |
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > google-play-service-account.json

      - name: Build and submit Android directly with Fastlane
        run: bundle exec fastlane android release

  ios:
    name: Build locally and submit iOS
    runs-on:
      - self-hosted
      - macOS
      - tekkommacmini
      - nucleus-release
    timeout-minutes: 180
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      RUNNER_TOOL_CACHE: /Users/tekkom/actions-runner/nucleus/_work/_tool
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Setup Ruby for Fastlane and CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Preflight direct store release
        run: node scripts/ci/verify-direct-store-release-env.mjs --strict --platform=ios

      - name: Test project
        run: npm test -- --runInBand

      - name: Generate iOS project locally
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Build and submit iOS directly with Fastlane
        run: bundle exec fastlane ios release
